<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Admission Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            width: 40%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .radio-group {
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }

        #message {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>College Admission Portal</h1>
</header>

<div class="container">
    <h2>Admission Form</h2>

    <form id="admissionForm">
        <label>Full Name:</label>
        <input type="text" id="name" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Phone Number:</label>
        <input type="text" id="phone" required>

        <label>Course:</label>
        <select id="course" required>
            <option value="">Select Course</option>
            <option>B.Tech</option>
            <option>B.Sc</option>
            <option>B.Com</option>
            <option>MBA</option>
        </select>

        <label>Gender:</label>
        <div class="radio-group">
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>

        <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
</div>

<script>
    document.getElementById("admissionForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let phone = document.getElementById("phone").value;
        let gender = document.querySelector('input[name="gender"]:checked');

        if (!gender) {
            showMessage("Please select gender!", "red");
            return;
        }

        if (phone.length !== 10 || isNaN(phone)) {
            showMessage("Enter valid 10-digit phone number!", "red");
            return;
        }

        showMessage("Application submitted successfully!", "green");
        document.getElementById("admissionForm").reset();
    });

    function showMessage(msg, color) {
        let message = document.getElementById("message");
        message.innerText = msg;
        message.style.color = color;
    }
</script>

</body>
</html>
